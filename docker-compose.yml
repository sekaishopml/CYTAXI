version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cytaxi-postgres
    environment:
      POSTGRES_DB: cytaxi
      POSTGRES_USER: cytaxi
      POSTGRES_PASSWORD: cytaxi_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tools/seed-db.sql:/docker-entrypoint-initdb.d/01-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cytaxi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cytaxi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --loadmodule /usr/lib/redis/modules/rejson.so
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: cytaxi-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "--jetstream --store_dir /data"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm=localhost:8222"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-ui:
    image: dpage/pgadmin4
    container_name: cytaxi-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cytaxi.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis-ui:
    image: rediscommander/redis-commander
    container_name: cytaxi-redis-ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  nats_data:
